<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VS Code Sweeper — Review Dashboard</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1f2328; --muted: #656d76; --border: #d0d7de;
    --accent: #0969da; --row: #f6f8fa;
    --close: #cf222e; --keep: #1a7f37; --info: #9a6700; --verify: #8250df; --route: #0969da;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#0d1117; --fg:#e6edf3; --muted:#8b949e; --border:#30363d; --accent:#2f81f7; --row:#161b22; }
  }
  * { box-sizing: border-box; }
  body { margin: 0; font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--fg); padding: 24px; }
  h1 { font-size: 20px; margin: 0 0 4px; }
  .sub { color: var(--muted); margin-bottom: 20px; }
  .cards { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
  .card { display: flex; flex-direction: column; align-items: flex-start; gap: 2px; cursor: pointer;
    border: 1px solid var(--border); background: var(--bg); color: var(--fg); border-radius: 8px;
    padding: 10px 14px; min-width: 120px; font: inherit; }
  .card.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent) inset; }
  .card .n { font-size: 22px; font-weight: 600; }
  .card .l { color: var(--muted); font-size: 12px; }
  .controls { margin-bottom: 12px; }
  input[type=search] { width: 100%; max-width: 360px; padding: 8px 10px; border: 1px solid var(--border);
    border-radius: 6px; background: var(--bg); color: var(--fg); font: inherit; }
  table { border-collapse: collapse; width: 100%; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
  th { cursor: pointer; user-select: none; white-space: nowrap; color: var(--muted); font-weight: 600; }
  th:hover { color: var(--fg); }
  tbody tr:hover { background: var(--row); }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .pill { display: inline-block; padding: 1px 8px; border-radius: 999px; font-size: 12px; font-weight: 600;
    border: 1px solid transparent; white-space: nowrap; }
  .a-propose-close { color: var(--close); border-color: var(--close); }
  .a-keep-open { color: var(--keep); border-color: var(--keep); }
  .a-needs-info { color: var(--info); border-color: var(--info); }
  .a-verification-needed { color: var(--verify); border-color: var(--verify); }
  .a-route-to-area { color: var(--route); border-color: var(--route); }
  .conf { display: inline-block; width: 60px; height: 6px; border-radius: 3px; background: var(--border); position: relative; vertical-align: middle; }
  .conf > i { position: absolute; left: 0; top: 0; bottom: 0; border-radius: 3px; background: var(--accent); }
  .muted { color: var(--muted); }
  code { background: var(--row); padding: 1px 5px; border-radius: 4px; }
  footer { margin-top: 24px; color: var(--muted); font-size: 12px; }
</style>
</head>
<body>
  <h1>VS Code Sweeper — Review Dashboard</h1>
  <div class="sub">Proposal-only triage findings for <code>microsoft/vscode</code> · 4 reviewed · generated 2026-06-24 09:52 UTC</div>
  <div class="cards" id="cards"><button class="card" data-action="propose-close"><span class="n">2</span><span class="l">propose-close</span></button><button class="card" data-action="needs-info"><span class="n">0</span><span class="l">needs-info</span></button><button class="card" data-action="verification-needed"><span class="n">0</span><span class="l">verification-needed</span></button><button class="card" data-action="route-to-area"><span class="n">0</span><span class="l">route-to-area</span></button><button class="card" data-action="keep-open"><span class="n">2</span><span class="l">keep-open</span></button></div>
  <div class="controls"><input id="q" type="search" placeholder="Filter by issue #, title, label…"></div>
  <table>
    <thead><tr>
      <th data-k="number">Issue</th><th data-k="title">Title</th><th data-k="itemType">Type</th>
      <th data-k="triageAction">Action</th><th data-k="proposedLabel">Label</th>
      <th data-k="confidence">Conf</th><th data-k="engine">Engine</th><th data-k="reviewedAt">Reviewed</th>
    </tr></thead>
    <tbody id="rows"></tbody>
  </table>
  <footer>Generated by <a href="https://github.com/egamma/vscodesweeper">vscodesweeper</a>. Records live on the <code>state</code> branch.</footer>
<script>
const DATA = [{"number":17901,"url":"https://github.com/microsoft/vscode/issues/17901","title":"Add extension point for custom \"prefix behaviors\" in command palette","engine":"codex","proposedLabel":"none","triageAction":"keep-open","itemType":"feature-request","confidence":0.93,"reviewedAt":"2026-06-24T09:46:35.063Z"},{"number":319542,"url":"https://github.com/microsoft/vscode/issues/319542","title":"Regression: Model cost multiplier removed from model selector","engine":"codex","proposedLabel":"*as-designed","triageAction":"propose-close","itemType":"feature-request","confidence":0.9,"reviewedAt":"2026-06-24T09:36:44.554Z"},{"number":320253,"url":"https://github.com/microsoft/vscode/issues/320253","title":"run and debug","engine":"codex","proposedLabel":"*as-designed","triageAction":"propose-close","itemType":"question","confidence":0.86,"reviewedAt":"2026-06-24T08:56:45.662Z"},{"number":375,"url":"https://github.com/microsoft/vscode/issues/375","title":"[html] intellisense should be more context aware","engine":"codex","proposedLabel":"none","triageAction":"keep-open","itemType":"feature-request","confidence":0.95,"reviewedAt":"2026-06-24T09:46:06.463Z"}];
let actionFilter = null, sortK = "reviewedAt", sortDir = -1;
const rowsEl = document.getElementById("rows"), qEl = document.getElementById("q");
function esc(s){const d=document.createElement("div");d.textContent=s==null?"":String(s);return d.innerHTML;}
function render(){
  const q = qEl.value.trim().toLowerCase();
  let rows = DATA.filter(r => {
    if (actionFilter && r.triageAction !== actionFilter) return false;
    if (q && !(String(r.number)+" "+r.title+" "+r.proposedLabel+" "+r.itemType).toLowerCase().includes(q)) return false;
    return true;
  });
  rows.sort((a,b)=>{ let x=a[sortK], y=b[sortK]; if(x<y)return -sortDir; if(x>y)return sortDir; return 0; });
  rowsEl.innerHTML = rows.map(r => {
    const pct = Math.round(r.confidence*100);
    return "<tr>"
      + '<td><a href="'+esc(r.url)+'" target="_blank" rel="noopener">#'+esc(r.number)+'</a></td>'
      + "<td>"+esc(r.title)+"</td>"
      + "<td>"+esc(r.itemType)+"</td>"
      + '<td><span class="pill a-'+esc(r.triageAction)+'">'+esc(r.triageAction)+"</span></td>"
      + "<td><code>"+esc(r.proposedLabel)+"</code></td>"
      + '<td><span class="conf"><i style="width:'+pct+'%"></i></span> <span class="muted">'+pct+"%</span></td>"
      + "<td>"+esc(r.engine)+"</td>"
      + '<td class="muted">'+esc((r.reviewedAt||"").slice(0,10))+"</td>"
      + "</tr>";
  }).join("") || '<tr><td colspan="8" class="muted">No matching records.</td></tr>';
}
document.querySelectorAll("#cards .card").forEach(c => c.addEventListener("click", () => {
  const a = c.dataset.action;
  actionFilter = actionFilter === a ? null : a;
  document.querySelectorAll("#cards .card").forEach(x => x.classList.toggle("active", x.dataset.action === actionFilter));
  render();
}));
document.querySelectorAll("th").forEach(th => th.addEventListener("click", () => {
  const k = th.dataset.k;
  if (sortK === k) sortDir = -sortDir; else { sortK = k; sortDir = 1; }
  render();
}));
qEl.addEventListener("input", render);
render();
</script>
</body>
</html>
