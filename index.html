let actionFilter = null, sortK = "owner", sortDir = 1;
const rowsEl = document.getElementById("rows"), qEl = document.getElementById("q");
function esc(s){const d=document.createElement("div");d.textContent=s==null?"":String(s);return d.innerHTML;}
function render(){
  const q = qEl.value.trim().toLowerCase();
  let rows = DATA.filter(r => {
    if (actionFilter && r.triageAction !== actionFilter) return false;
    if (q && !(String(r.number)+" "+r.title+" "+r.proposedLabel+" "+r.itemType+" "+(r.owner||"")).toLowerCase().includes(q)) return false;
    return true;
  });
  rows.sort((a,b)=>{ let x=a[sortK], y=b[sortK]; if(x<y)return -sortDir; if(x>y)return sortDir; return a.number-b.number; });
  rowsEl.innerHTML = rows.map(r => {
    const pct = Math.round(r.confidence*100);
    return "<tr>"
      + "<td>"+esc(r.owner||"—")+"</td>"
      + '<td><a href="'+esc(r.url)+'" target="_blank" rel="noopener">#'+esc(r.number)+'</a></td>'
      + "<td>"+esc(r.title)+"</td>"
      + "<td>"+esc(r.itemType)+"</td>"
      + '<td><span class="pill a-'+esc(r.triageAction)+'">'+esc(r.triageAction)+"</span></td>"
      + "<td><code>"+esc(r.proposedLabel)+"</code></td>"
      + '<td><span class="conf"><i style="width:'+pct+'%"></i></span> <span class="muted">'+pct+"%</span></td>"
      + '<td><a href="'+esc(r.reviewUrl)+'" target="_blank" rel="noopener">view</a></td>'
      + '<td class="muted">'+esc((r.reviewedAt||"").slice(0,10))+"</td>"
      + "</tr>";
  }).join("") || '<tr><td colspan="9" class="muted">No matching records.</td></tr>';
}
document.querySelectorAll("#cards .card").forEach(c => c.addEventListener("click", () => {
  const a = c.dataset.action;
  actionFilter = actionFilter === a ? null : a;
  document.querySelectorAll("#cards .card").forEach(x => x.classList.toggle("active", x.dataset.action === actionFilter));
  render();
}));
document.querySelectorAll("th").forEach(th => th.addEventListener("click", () => {
  const k = th.dataset.k;
  if (!k) return;
  if (sortK === k) sortDir = -sortDir; else { sortK = k; sortDir = 1; }
  render();
}));
qEl.addEventListener("input", render);
render();
</script>
